{% extends "base.html" %}
{% block title %}Add Song – Admin{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <h2 class="mb-4">➕ Add Song</h2>
    <form method="post">
      <div class="mb-3">
        <label for="name" class="form-label fw-semibold">Song Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="name" name="name" value="{{ name }}" required autofocus />
      </div>
      <div class="mb-3">
        <label for="rate" class="form-label fw-semibold">Rate (0 – 10) <span class="text-danger">*</span></label>
        <input type="number" class="form-control" id="rate" name="rate" value="{{ rate }}"
               min="0" max="10" step="0.1" required />
      </div>
      <div class="mb-4">
        <label for="url" class="form-label fw-semibold">URL <span class="text-muted">(optional)</span></label>
        <input type="url" class="form-control" id="url" name="url" value="{{ url }}"
               placeholder="https://example.com/song" />
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{{ url_for('admin') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
